on:
  push:
    branches-ignore:
      - 'maint'
      - 'stable'

jobs:
  test_sqlite:
    runs-on: ubuntu-latest
    steps:
      - name: Set up for tests
        shell: bash
        run: |
          echo "SB_BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          echo "SB_GA_START_TIME=$(date +%s)" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          docker run --rm -v $GITHUB_WORKSPACE:/workspace \
            bpssysadmin/rt-base-debian:RT-6.0.3-bullseye-20251125 \
            bash -c "cd /workspace && prove -vl t/"
      - name: Get run time
        if: always()
        shell: bash
        run: |
          SB_GA_END_TIME=$(date +%s)
          SB_GA_TEST_TIME=$(date -u -d @"$(( SB_GA_END_TIME - ${{ env.SB_GA_START_TIME }} ))" +"%T")
          echo "SB_GA_TEST_TIME=$SB_GA_TEST_TIME" >> $GITHUB_ENV
      - name: Post results to Slack
        if: ${{ always() && github.repository_owner == 'bestpractical' }}
        uses: welliba/simple-slack-notify@e1ff920c08c147568f1a40cffd47ce1fa7d4d22c
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFICATIONS }}
        with:
          channel: '#github'
          status: ${{ job.status }}
          success_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests completed successfully in ${env.SB_GA_TEST_TIME}'
          failure_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests failed in ${env.SB_GA_TEST_TIME}'
          cancelled_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests cancelled in ${env.SB_GA_TEST_TIME}'
          fields: |
            [{"title": "Configuration", "value": "SQLite", "short": true},
            {"title": "URL", "value": "${env.GITHUB_SERVER_URL}/${env.GITHUB_REPOSITORY}/actions/runs/${env.GITHUB_RUN_ID}?check_suite_focus=true", "short": true}]

  test_mysql:
    runs-on: ubuntu-latest
    steps:
      - name: Set up for tests
        shell: bash
        run: |
          echo "SB_BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          echo "SB_GA_START_TIME=$(date +%s)" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      - name: Start MySQL
        run: |
          docker network create sb
          docker run --network sb --name mysql \
            -e MYSQL_ROOT_PASSWORD=password \
            -e MYSQL_DATABASE=sbtest \
            -d mysql:8.0 --default-authentication-plugin=mysql_native_password
      - name: Wait for MySQL
        run: |
          until docker exec mysql mysqladmin ping -h 127.0.0.1 --silent 2>/dev/null; do sleep 2; done
      - name: Run tests
        run: |
          docker run --rm -v $GITHUB_WORKSPACE:/workspace --network sb \
            -e SB_TEST_MYSQL=sbtest \
            -e SB_TEST_MYSQL_HOST=mysql \
            -e SB_TEST_MYSQL_USER=root \
            -e SB_TEST_MYSQL_PASS=password \
            bpssysadmin/rt-base-debian:RT-6.0.3-bullseye-20251125 \
            bash -c "cd /workspace && prove -vl t/"
      - name: Get run time
        if: always()
        shell: bash
        run: |
          SB_GA_END_TIME=$(date +%s)
          SB_GA_TEST_TIME=$(date -u -d @"$(( SB_GA_END_TIME - ${{ env.SB_GA_START_TIME }} ))" +"%T")
          echo "SB_GA_TEST_TIME=$SB_GA_TEST_TIME" >> $GITHUB_ENV
      - name: Post results to Slack
        if: ${{ always() && github.repository_owner == 'bestpractical' }}
        uses: welliba/simple-slack-notify@e1ff920c08c147568f1a40cffd47ce1fa7d4d22c
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFICATIONS }}
        with:
          channel: '#github'
          status: ${{ job.status }}
          success_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests completed successfully in ${env.SB_GA_TEST_TIME}'
          failure_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests failed in ${env.SB_GA_TEST_TIME}'
          cancelled_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests cancelled in ${env.SB_GA_TEST_TIME}'
          fields: |
            [{"title": "Configuration", "value": "MySQL 8.0", "short": true},
            {"title": "URL", "value": "${env.GITHUB_SERVER_URL}/${env.GITHUB_REPOSITORY}/actions/runs/${env.GITHUB_RUN_ID}?check_suite_focus=true", "short": true}]

  test_mariadb:
    runs-on: ubuntu-latest
    steps:
      - name: Set up for tests
        shell: bash
        run: |
          echo "SB_BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          echo "SB_GA_START_TIME=$(date +%s)" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      - name: Start MariaDB
        run: |
          docker network create sb
          docker run --network sb --name mariadb \
            -e MARIADB_ROOT_PASSWORD=password \
            -e MARIADB_DATABASE=sbtest \
            -d mariadb:10.6
      - name: Wait for MariaDB
        run: |
          until docker exec mariadb mysqladmin ping -h 127.0.0.1 --silent 2>/dev/null; do sleep 2; done
      - name: Run tests
        run: |
          docker run --rm -v $GITHUB_WORKSPACE:/workspace --network sb \
            -e SB_TEST_MARIADB=sbtest \
            -e SB_TEST_MARIADB_HOST=mariadb \
            -e SB_TEST_MARIADB_USER=root \
            -e SB_TEST_MARIADB_PASS=password \
            bpssysadmin/rt-base-debian:RT-6.0.3-bullseye-20251125 \
            bash -c "cd /workspace && prove -vl t/"
      - name: Get run time
        if: always()
        shell: bash
        run: |
          SB_GA_END_TIME=$(date +%s)
          SB_GA_TEST_TIME=$(date -u -d @"$(( SB_GA_END_TIME - ${{ env.SB_GA_START_TIME }} ))" +"%T")
          echo "SB_GA_TEST_TIME=$SB_GA_TEST_TIME" >> $GITHUB_ENV
      - name: Post results to Slack
        if: ${{ always() && github.repository_owner == 'bestpractical' }}
        uses: welliba/simple-slack-notify@e1ff920c08c147568f1a40cffd47ce1fa7d4d22c
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFICATIONS }}
        with:
          channel: '#github'
          status: ${{ job.status }}
          success_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests completed successfully in ${env.SB_GA_TEST_TIME}'
          failure_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests failed in ${env.SB_GA_TEST_TIME}'
          cancelled_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests cancelled in ${env.SB_GA_TEST_TIME}'
          fields: |
            [{"title": "Configuration", "value": "MariaDB 10.6", "short": true},
            {"title": "URL", "value": "${env.GITHUB_SERVER_URL}/${env.GITHUB_REPOSITORY}/actions/runs/${env.GITHUB_RUN_ID}?check_suite_focus=true", "short": true}]

  test_postgresql:
    runs-on: ubuntu-latest
    steps:
      - name: Set up for tests
        shell: bash
        run: |
          echo "SB_BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          echo "SB_GA_START_TIME=$(date +%s)" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      - name: Start PostgreSQL
        run: |
          docker network create sb
          docker run --network sb --name postgres \
            -e POSTGRES_PASSWORD=password \
            -e POSTGRES_DB=sbtest \
            -d postgres:16
      - name: Wait for PostgreSQL
        run: |
          until docker exec postgres pg_isready 2>/dev/null; do sleep 2; done
      - name: Run tests
        run: |
          docker run --rm -v $GITHUB_WORKSPACE:/workspace --network sb \
            -e SB_TEST_PG=sbtest \
            -e SB_TEST_PG_HOST=postgres \
            -e SB_TEST_PG_USER=postgres \
            -e SB_TEST_PG_PASS=password \
            bpssysadmin/rt-base-debian:RT-6.0.3-bullseye-20251125 \
            bash -c "cd /workspace && prove -vl t/"
      - name: Get run time
        if: always()
        shell: bash
        run: |
          SB_GA_END_TIME=$(date +%s)
          SB_GA_TEST_TIME=$(date -u -d @"$(( SB_GA_END_TIME - ${{ env.SB_GA_START_TIME }} ))" +"%T")
          echo "SB_GA_TEST_TIME=$SB_GA_TEST_TIME" >> $GITHUB_ENV
      - name: Post results to Slack
        if: ${{ always() && github.repository_owner == 'bestpractical' }}
        uses: welliba/simple-slack-notify@e1ff920c08c147568f1a40cffd47ce1fa7d4d22c
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFICATIONS }}
        with:
          channel: '#github'
          status: ${{ job.status }}
          success_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests completed successfully in ${env.SB_GA_TEST_TIME}'
          failure_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests failed in ${env.SB_GA_TEST_TIME}'
          cancelled_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests cancelled in ${env.SB_GA_TEST_TIME}'
          fields: |
            [{"title": "Configuration", "value": "PostgreSQL 16", "short": true},
            {"title": "URL", "value": "${env.GITHUB_SERVER_URL}/${env.GITHUB_REPOSITORY}/actions/runs/${env.GITHUB_RUN_ID}?check_suite_focus=true", "short": true}]

  test_oracle:
    runs-on: ubuntu-latest
    steps:
      - name: Set up for tests
        shell: bash
        run: |
          echo "SB_BRANCH_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          echo "SB_GA_START_TIME=$(date +%s)" >> $GITHUB_ENV
      - uses: actions/checkout@v4
      - name: Start Oracle
        run: |
          docker network create sb
          docker run --network sb --name oracle \
            -e ORACLE_PWD=password \
            -d container-registry.oracle.com/database/free:23.3.0.0 \
            bash -c "echo 'USE_SID_AS_SERVICE_LISTENER = on' >> /opt/oracle/product/23c/dbhomeFree/network/admin/listener.ora && /opt/oracle/runOracle.sh"
      - name: Wait for Oracle
        run: |
          for i in $(seq 1 60); do
            [ "$(docker inspect --format='{{.State.Health.Status}}' oracle)" = "healthy" ] && break
            echo "Waiting for Oracle... ($i/60)"
            sleep 10
          done
      - name: Create test user
        run: |
          docker exec -i oracle sqlplus -s system/password@//localhost/freepdb1 << 'EOF'
          ALTER PROFILE DEFAULT LIMIT PASSWORD_VERIFY_FUNCTION NULL;
          CREATE USER sbtest IDENTIFIED BY sbtest DEFAULT TABLESPACE users QUOTA UNLIMITED ON users;
          GRANT CONNECT, RESOURCE TO sbtest;
          EXIT;
          EOF
      - name: Run tests
        run: |
          docker run --rm -v $GITHUB_WORKSPACE:/workspace --network sb \
            -e SB_TEST_ORACLE=freepdb1 \
            -e SB_TEST_ORACLE_HOST=oracle \
            -e SB_TEST_ORACLE_SID=freepdb1 \
            -e SB_TEST_ORACLE_USER=sbtest \
            -e SB_TEST_ORACLE_PASS=sbtest \
            bpssysadmin/rt-base-debian:RT-6.0.3-bullseye-20251125 \
            bash -c "cd /workspace && prove -vl t/"
      - name: Get run time
        if: always()
        shell: bash
        run: |
          SB_GA_END_TIME=$(date +%s)
          SB_GA_TEST_TIME=$(date -u -d @"$(( SB_GA_END_TIME - ${{ env.SB_GA_START_TIME }} ))" +"%T")
          echo "SB_GA_TEST_TIME=$SB_GA_TEST_TIME" >> $GITHUB_ENV
      - name: Post results to Slack
        if: ${{ always() && github.repository_owner == 'bestpractical' }}
        uses: welliba/simple-slack-notify@e1ff920c08c147568f1a40cffd47ce1fa7d4d22c
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_NOTIFICATIONS }}
        with:
          channel: '#github'
          status: ${{ job.status }}
          success_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests completed successfully in ${env.SB_GA_TEST_TIME}'
          failure_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests failed in ${env.SB_GA_TEST_TIME}'
          cancelled_text: '${env.SB_BRANCH_NAME} (${env.GITHUB_RUN_NUMBER}) tests cancelled in ${env.SB_GA_TEST_TIME}'
          fields: |
            [{"title": "Configuration", "value": "Oracle 23.3", "short": true},
            {"title": "URL", "value": "${env.GITHUB_SERVER_URL}/${env.GITHUB_REPOSITORY}/actions/runs/${env.GITHUB_RUN_ID}?check_suite_focus=true", "short": true}]
